name: Deploy API to DigitalOcean

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: SSH & deploy on Droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -e

            APP_DIR="/var/www/api.dvi.travel"
            APP_NAME="dvi-backend"

            echo "Switching to app directory..."
            cd "$APP_DIR"

            echo "Pulling latest code from main..."
            git fetch origin main
            git reset --hard origin/main

            echo "Writing production .env file..."
            cat > .env <<'EOF'
            ${{ secrets.BACKEND_ENV_FILE }}
            EOF

            echo "Node and npm versions..."
            node -v
            npm -v

            echo "Stopping PM2 process before reinstall..."
            pm2 stop "$APP_NAME" || true

            echo "Installing dependencies..."
            rm -rf node_modules
            rm -rf ~/.npm/_cacache ~/.npm/_logs
            npm cache clean --force || true
            npm cache verify || true

            if ! npm ci --no-audit --no-fund; then
              echo "npm ci failed on first attempt. Cleaning install artifacts and retrying once..."
              rm -rf node_modules
              rm -rf ~/.npm/_cacache ~/.npm/_logs
              npm cache clean --force || true
              npm ci --no-audit --no-fund --prefer-online
            fi

            echo "Generating Prisma client..."
            npx prisma generate

            echo "Running Prisma DB push..."
            set +e
            npx prisma db push
            PRISMA_EXIT=$?
            set -e

            if [ $PRISMA_EXIT -ne 0 ]; then
              echo "Prisma db push failed. Deployment aborted."
              exit 1
            fi

            echo "Building app..."
            NODE_OPTIONS="--max-old-space-size=4096" npm run build

            echo "Starting or restarting PM2 process..."
            if pm2 describe "$APP_NAME" > /dev/null 2>&1; then
              pm2 restart "$APP_NAME"
            else
              pm2 start dist/src/main.js --name "$APP_NAME"
            fi

            echo "Saving PM2 process list..."
            pm2 save

            echo "PM2 status:"
            pm2 status

            echo "Deployment completed successfully."
