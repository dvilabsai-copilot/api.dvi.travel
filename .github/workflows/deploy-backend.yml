name: Deploy API to DigitalOcean

on:
  pull_request:
    types: [closed]
    branches: [main]
  push:
    branches: [main]

jobs:
  deploy:
    if: github.event_name == 'push' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: SSH & deploy on Droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            set -e

            APP_DIR="/var/www/api.dvi.travel"

            echo "Switching to app directory..."
            cd "$APP_DIR"

            echo "Pulling latest code from main..."
            git fetch origin main
            git reset --hard origin/main

            echo "Writing production .env file..."
            cat > .env <<'EOF'
            ${{ secrets.BACKEND_ENV_FILE }}
            EOF

            echo "Node and npm versions..."
            node -v
            npm -v

            echo "Stopping PM2 process before reinstall..."
            pm2 stop dvi-backend || true

            echo "Installing dependencies..."
            rm -rf node_modules
            npm cache verify || npm cache clean --force
            if ! npm ci --no-audit --no-fund; then
              echo "npm ci failed on first attempt. Cleaning install artifacts and retrying once..."
              rm -rf node_modules
              npm cache clean --force
              npm ci --no-audit --no-fund
            fi

            echo "Generating Prisma client..."
            npx prisma generate

            echo "Running Prisma DB push..."
            set +e
            npx prisma db push
            PRISMA_EXIT=$?
            set -e

            if [ $PRISMA_EXIT -ne 0 ]; then
              echo "Prisma db push failed. Deployment aborted."
              exit 1
            fi

            echo "Building app..."
            NODE_OPTIONS="--max-old-space-size=4096" npm run build

            echo "Restarting PM2 process 'dvi-backend'..."
            pm2 restart dvi-backend || pm2 start dist/src/main.js --name dvi-backend

            echo "Saving PM2 process list..."
            pm2 save

            echo "Deployment completed successfully."